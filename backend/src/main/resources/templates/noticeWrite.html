<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>공지사항 등록</title>
</head>
<body>
<div>
	<h2>공지사항 등록</h2>
	<form th:action="@{/notice/write}" method="post">
		<div>
			<label>제목</label>
			<input type="text" name="title" placeholder="제목을 입력하세요.">
		</div>
		<div>
			<label>작성자</label>
			<input type="text" name="writer" placeholder="작성자 이름">
		</div>
		<div>
			<label>내용</label>
			<textarea name="content" rows="10" placeholder="내용을 입력하세요."></textarea>
		</div>
		<br>
		<button type="submit">등록</button>
		<button type="reset">취소</button>
		<a th:href="@{/notice/list}">공지사항 목록으로</a>
	</form>
</div>
</body>
</html>

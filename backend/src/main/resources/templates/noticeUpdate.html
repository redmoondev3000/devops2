<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>공지사항 수정</title>
</head>
<body>
<div>
	<h2>공지사항 수정</h2>
	<form th:action="@{/notice/update}" method="post">
		<input type="hidden" name="id" th:value="${notice.id}">
		<div>
			<label>제목</label>
			<input type="text" name="title" th:value="${notice.title}">
		</div><br>
		<div>
			<label>내용</label>
			<textarea name="content" rows="10" cols="30" th:text="${notice.content}"></textarea>
		</div><br>
		<button type="submit">수정완료</button>
		<a th:href="@{/notice/detail(id=${notice.id})}">취소</a>
	</form>
</div>
</body>
</html>

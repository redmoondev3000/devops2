<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>로그인 폼</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
	<h1>로그인</h1>
	<form th:action="@{/login}" method="post">
		<div class="form-group">
			<label>아이디</label>
			<input type="text" name="userId" placeholder="" required>
		</div>
		<div class="form-group">
			<label>비밀번호</label>
			<input type="password" name="userPw" placeholder="" required>
		</div>
		<button type="submit" class="btn-primary">로그인</button>
		
		<p th:if="${errorMsg}" th:text="${errorMsg}" style="color: #dc3545; font-size: 13px; margin-top: 15px;"></p>
	</form>
	<div style="margin-top: 20px;" class="menu">
		<a th:href="@{/join}">아직 회원이 아니신가요? 회원가입</a><br>
		<a th:href="@{/}">홈으로 돌아가기</a>
	</div>
</div>
</body>
</html>

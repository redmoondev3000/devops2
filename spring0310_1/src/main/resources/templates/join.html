<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
	<h1>회원가입</h1>
	<form th:action="@{/join}" method="post">
		<div class="form-group">
			<label>아이디</label>
			<div style="display:flex; gap:5px;">
				<input type="text" name="userId" id="userId" required>
				<button type="button" onclick="checkId()" style="white-space:nowrap;">중복확인</button>
			</div>
			<span id="idMsg" style="font-size:12px;"></span>
		</div>
		<div class="form-group">
			<label>비밀번호</label>
			<input type="password" name="userPw" id="userPw" required>
		</div>
		<div class="form-group">
			<label>이름</label>
			<input type="text" name="userName" id="userName" required>
		</div>
		<button type="submit" id="submitBtn" class="btn-primary">가입 완료</button>
	</form>
</div>

<script>
	async function checkId() {
		const userId = document.getElementById('userId').value;
		if(!userId){
			alert("아이디를 입력하세요.");
			return;
		}
		
		const response = await fetch(`/idCheck?userid=${userId}`);
		const count = await response.json();
		const msg = document.getElementById('idMsg');
		const btn = document.getElementById('submitBtn');
		if(count === 0){
			msg.innerText = "사용 가능합니다."; msg.style.color = "green"; btn.disabled = false;	
		} else {
			msg.innerText = "중복된 아이디 입니다."; msg.style.color = "red"; btn.disabled = true;	
		}
		
	}
</script>
</body>
</html>
